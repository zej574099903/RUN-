name: RunPlus
options:
  bundleIdPrefix: com.zej
targets:
  RunPlus:
    type: application
    platform: iOS
    deploymentTarget:
      iOS: 17.0
    sources:
      - path: Sources
      - path: Resources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.zej.runplus
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      INFOPLIST_FILE: Resources/Info.plist
      MARKETING_VERSION: 1.0.0
      CURRENT_PROJECT_VERSION: 1
    entitlements:
      path: Resources/RunPlus.entitlements
      properties:
        com.apple.developer.healthkit: true
